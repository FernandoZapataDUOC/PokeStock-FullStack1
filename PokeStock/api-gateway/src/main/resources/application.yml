server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: ms-productos
          uri: lb://ms-productos
          predicates:
            - Path=/api/productos/**,/api/categorias/**
        - id: ms-proveedores
          uri: lb://ms-proveedores
          predicates:
            - Path=/api/proveedores,/api/proveedores/**
        - id: ms-stock
          uri: lb://ms-stock
          predicates:
            - Path=/api/stock/**
        - id: ms-documentos
          uri: lb://ms-documentos
          predicates:
            - Path=/api/documentos/**
        - id: ms-validaciones
          uri: lb://ms-validaciones
          predicates:
            - Path=/api/validaciones/**
        - id: ms-movimientos
          uri: lb://ms-movimientos
          predicates:
            - Path=/api/movimientos/**
        - id: ms-reportes
          uri: lb://ms-reportes
          predicates:
            - Path=/api/reportes/**
        - id: ms-usuarios
          uri: lb://ms-usuarios
          predicates:
            - Path=/api/usuarios/**,/api/roles/**
        - id: ms-auth
          uri: lb://ms-auth
          predicates:
            - Path=/api/auth/**
        - id: ms-security
          uri: lb://ms-security
          predicates:
            - Path=/api/security/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
