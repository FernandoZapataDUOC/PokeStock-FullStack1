# Servidor
server.port=8080

# Spring Application
spring.application.name=api-gateway

# Gateway Discovery Locator (Auto-mapeo de rutas usando Eureka)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Gateway Routes
# ms-productos
spring.cloud.gateway.routes[0].id=ms-productos
spring.cloud.gateway.routes[0].uri=lb://ms-productos
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/productos/**,/api/categorias/**

# ms-proveedores
spring.cloud.gateway.routes[1].id=ms-proveedores
spring.cloud.gateway.routes[1].uri=lb://ms-proveedores
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/proveedores,/api/proveedores/**

# ms-stock
spring.cloud.gateway.routes[2].id=ms-stock
spring.cloud.gateway.routes[2].uri=lb://ms-stock
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/stock/**

# ms-documentos
spring.cloud.gateway.routes[3].id=ms-documentos
spring.cloud.gateway.routes[3].uri=lb://ms-documentos
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/documentos/**

# ms-validaciones
spring.cloud.gateway.routes[4].id=ms-validaciones
spring.cloud.gateway.routes[4].uri=lb://ms-validaciones
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/validaciones/**

# ms-movimientos
spring.cloud.gateway.routes[5].id=ms-movimientos
spring.cloud.gateway.routes[5].uri=lb://ms-movimientos
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/movimientos/**

# ms-reportes
spring.cloud.gateway.routes[6].id=ms-reportes
spring.cloud.gateway.routes[6].uri=lb://ms-reportes
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/reportes/**

# Eureka Client
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
