server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          # Registra automáticamente rutas para cada servicio en Eureka
          enabled: true
          # Permite usar el nombre en minúsculas: /ms-productos en vez de /MS-PRODUCTOS
          lower-case-service-id: true
      routes:
        - id: ms-productos
          uri: lb://ms-productos
          predicates:
            - Path=/api/productos/**,/api/categorias/**

        - id: ms-proveedores
          uri: lb://ms-proveedores
          predicates:
            - Path=/api/proveedores,/api/proveedores/**

        - id: ms-stock
          uri: lb://ms-stock
          predicates:
            - Path=/api/stock/**

        - id: ms-documentos
          uri: lb://ms-documentos
          predicates:
            - Path=/api/documentos/**

        - id: ms-validaciones
          uri: lb://ms-validaciones
          predicates:
            - Path=/api/validaciones/**

        - id: ms-movimientos
          uri: lb://ms-movimientos
          predicates:
            - Path=/api/movimientos/**

        - id: ms-reportes
          uri: lb://ms-reportes
          predicates:
            - Path=/api/reportes/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true